<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arenda | Мои бронирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* --- ПАЛИТРА (Tangaroa + Firebrick) --- */
        :root {
            --tangaroa: #0D2744;
            --wedgewood: #53728A;
            --shipcove: #7691AD;
            --spindle: #B9CFDD;
            --firebrick: #FF929A;
            --firebrick-hover: #e07a83;
            --white: #FFFFFF;
            --text-dark: #1a2a3a;
            --text-light: #6a7f8f;
            --shadow-sm: 0 8px 20px rgba(13, 39, 68, 0.06);
            --shadow-md: 0 12px 28px rgba(13, 39, 68, 0.1);
            --shadow-lg: 0 20px 35px -10px rgba(13, 39, 68, 0.15);
            --gradient-fire: linear-gradient(135deg, #FF929A 0%, #f07a83 100%);
            
            /* Светлая тема */
            --bg-body: #B9CFDD;
            --bg-gradient-start: #d4e5f0;
            --bg-gradient-mid: #B9CFDD;
            --bg-gradient-end: #a8c0ce;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(255, 146, 154, 0.25);
            --text-primary: #1a2a3a;
            --text-secondary: #6a7f8f;
            --input-bg: #f9fafb;
            --input-border: #e5e7eb;
            --input-focus: #FF929A;
            --stat-bg: rgba(255, 255, 255, 0.7);
            --stat-border: rgba(255, 146, 154, 0.2);
            --booking-bg: rgba(255, 255, 255, 0.7);
            --booking-border: #e5e7eb;
            --status-active-bg: #dcfce7;
            --status-active-color: #166534;
            --status-completed-bg: #f3f4f6;
            --status-completed-color: #4b5563;
            --status-cancelled-bg: #fee2e2;
            --status-cancelled-color: #991b1b;
            --status-waiting-bg: #fef9c3;
            --status-waiting-color: #854d0e;
            --tab-bg: transparent;
            --tab-active-bg: rgba(255, 146, 154, 0.2);
            --tab-active-color: #FF929A;
            --tab-hover-bg: rgba(255, 146, 154, 0.1);
            --sun-icon-color: #B9CFDD;
            --moon-icon-color: #B9CFDD;
            --header-bg: rgba(13, 39, 68, 0.85);
            --header-text: rgba(185, 207, 221, 0.9);
            --header-border: rgba(255, 255, 255, 0.1);
            --modal-bg: #FFFFFF;
            --review-card-bg: rgba(255, 255, 255, 0.5);
        }
        
        /* Тёмная тема */
        body.dark {
            --bg-body: #0D2744;
            --bg-gradient-start: #1a3a5a;
            --bg-gradient-mid: #0D2744;
            --bg-gradient-end: #06152a;
            --card-bg: rgba(58, 90, 122, 0.95);
            --card-border: rgba(255, 146, 154, 0.35);
            --text-primary: #FFFFFF;
            --text-secondary: #c0d0e0;
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-focus: #FF929A;
            --stat-bg: rgba(58, 90, 122, 0.8);
            --stat-border: rgba(255, 146, 154, 0.3);
            --booking-bg: rgba(58, 90, 122, 0.6);
            --booking-border: rgba(255, 255, 255, 0.1);
            --status-active-bg: rgba(34, 197, 94, 0.2);
            --status-active-color: #4ade80;
            --status-completed-bg: rgba(255, 255, 255, 0.1);
            --status-completed-color: #9ca3af;
            --status-cancelled-bg: rgba(239, 68, 68, 0.2);
            --status-cancelled-color: #f87171;
            --status-waiting-bg: rgba(234, 179, 8, 0.2);
            --status-waiting-color: #fbbf24;
            --tab-bg: transparent;
            --tab-active-bg: rgba(255, 146, 154, 0.25);
            --tab-active-color: #FF929A;
            --tab-hover-bg: rgba(255, 146, 154, 0.15);
            --sun-icon-color: #0D2744;
            --moon-icon-color: #0D2744;
            --header-bg: rgba(185, 207, 221, 0.95);
            --header-text: #0D2744;
            --header-border: rgba(13, 39, 68, 0.15);
            --modal-bg: #3a5a7a;
            --review-card-bg: rgba(58, 90, 122, 0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            background: var(--bg-body);
            transition: all 0.3s ease;
        }
        
        /* --- ЖИВОЙ ФОН --- */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            z-index: 0;
        }
        
        .bg-circle-1 { position: fixed; top: -150px; right: -100px; width: 550px; height: 550px; background: radial-gradient(circle, rgba(255, 146, 154, 0.25) 0%, transparent 70%); border-radius: 50%; z-index: 0; }
        .bg-circle-2 { position: fixed; bottom: -120px; left: -80px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(13, 39, 68, 0.15) 0%, transparent 70%); border-radius: 50%; z-index: 0; }
        
        /* --- ШАПКА --- */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1200px;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--header-border);
            z-index: 100;
        }
        
        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #FF929A 0%, #B9CFDD 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        
        body.dark .logo {
            background: linear-gradient(135deg, #FF929A 0%, #0D2744 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }
        
        .right-section { display: flex; align-items: center; gap: 20px; }
        .nav { display: flex; gap: 20px; align-items: center; }
        .nav a { color: var(--header-text); text-decoration: none; font-weight: 500; transition: all 0.2s; }
        .nav a:hover { color: var(--firebrick); }
        
        /* --- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ --- */
        .theme-switch { display: flex; gap: 4px; background: rgba(13, 39, 68, 0.15); border-radius: 60px; padding: 4px; }
        body.dark .theme-switch { background: rgba(185, 207, 221, 0.2); }
        .theme-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 6px 12px; border-radius: 60px; }
        .theme-btn.light.active, .theme-btn.dark.active { background: var(--gradient-fire); color: #0D2744; }
        
        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        .main-container { max-width: 1100px; margin: 0 auto; padding-top: 100px; padding-bottom: 40px; position: relative; z-index: 10; }
        
        /* --- КАРТОЧКА --- */
        .bookings-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            border: 1px solid var(--card-border);
        }
        
        .bookings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 20px; }
        .bookings-title h2 { color: var(--text-primary); font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .bookings-title p { color: var(--text-secondary); font-size: 15px; }
        .back-btn { padding: 12px 24px; background: transparent; border: 2px solid var(--input-border); border-radius: 60px; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .back-btn:hover { border-color: var(--firebrick); color: var(--firebrick); }
        
        /* --- ВКЛАДКИ --- */
        .section-tabs { display: flex; gap: 12px; margin-bottom: 32px; border-bottom: 2px solid var(--input-border); padding-bottom: 12px; }
        .section-tab { padding: 10px 24px; background: transparent; border: none; font-size: 16px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-radius: 60px; transition: all 0.2s; }
        .section-tab:hover { background: var(--tab-hover-bg); color: var(--firebrick); }
        .section-tab.active { background: var(--tab-active-bg); color: var(--firebrick); }
        .section-content { display: none; }
        .section-content.active { display: block; }
        
        /* --- Фильтры --- */
        .filters-section { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .search-field { flex: 1; min-width: 250px; }
        .search-field input { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 2px solid var(--input-border); border-radius: 60px; font-size: 15px; color: var(--text-primary); }
        .search-field input:focus { outline: none; border-color: var(--input-focus); }
        .filter-select { padding: 14px 32px 14px 16px; background: var(--input-bg); border: 2px solid var(--input-border); border-radius: 60px; font-size: 15px; color: var(--text-primary); cursor: pointer; }
        
        /* --- Статистика --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--stat-bg); border: 1px solid var(--stat-border); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--firebrick); margin-bottom: 4px; }
        .stat-label { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        
        /* --- Статус кнопки --- */
        .status-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .status-btn { padding: 10px 20px; background: var(--tab-bg); border: 1px solid var(--input-border); border-radius: 60px; font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer; }
        .status-btn:hover { border-color: var(--firebrick); color: var(--firebrick); }
        .status-btn.active { background: var(--tab-active-bg); border-color: var(--firebrick); color: var(--firebrick); }
        
        /* --- Список бронирований --- */
        .bookings-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
        .booking-item { background: var(--booking-bg); border: 1px solid var(--booking-border); border-radius: 24px; padding: 24px; transition: all 0.2s; }
        .booking-item:hover { border-color: var(--firebrick); box-shadow: var(--shadow-md); }
        .booking-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .booking-title h3 { color: var(--text-primary); font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .booking-address { color: var(--text-secondary); font-size: 14px; }
        .booking-status { padding: 8px 16px; border-radius: 60px; font-size: 13px; font-weight: 600; }
        .status-active { background: var(--status-active-bg); color: var(--status-active-color); }
        .status-completed { background: var(--status-completed-bg); color: var(--status-completed-color); }
        .status-cancelled { background: var(--status-cancelled-bg); color: var(--status-cancelled-color); }
        .status-waiting { background: var(--status-waiting-bg); color: var(--status-waiting-color); }
        
        .booking-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
        .detail-value { color: var(--text-primary); font-size: 16px; font-weight: 600; }
        .detail-value.price { color: var(--firebrick); font-size: 20px; }
        
        .booking-actions { display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid var(--booking-border); padding-top: 20px; }
        .action-btn { padding: 10px 20px; border: 1px solid var(--input-border); background: transparent; border-radius: 60px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; }
        .action-btn:hover { border-color: var(--firebrick); color: var(--firebrick); }
        .action-btn.cancel:hover { border-color: #dc2626; color: #dc2626; }
        .action-btn.disabled { opacity: 0.5; cursor: not-allowed; background: var(--input-border); }
        .action-btn.disabled:hover { border-color: var(--input-border); color: var(--text-secondary); }
        
        /* --- Отзывы (список) --- */
        .reviews-list { display: flex; flex-direction: column; gap: 20px; }
        .review-card { background: var(--review-card-bg); border: 1px solid var(--booking-border); border-radius: 24px; padding: 24px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .review-apartment { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .review-stars { font-size: 20px; color: #f59e0b; }
        .review-text { color: var(--text-primary); font-size: 15px; line-height: 1.5; margin-bottom: 12px; }
        .review-date { color: var(--text-secondary); font-size: 12px; }
        .review-status { display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 12px; font-weight: 500; background: var(--status-waiting-bg); color: var(--status-waiting-color); }
        .review-status.approved { background: var(--status-active-bg); color: var(--status-active-color); }
        
        .empty-message { text-align: center; color: var(--text-secondary); font-size: 18px; padding: 60px; background: var(--booking-bg); border-radius: 32px; }
        .loader { text-align: center; padding: 60px; color: var(--text-secondary); }
        .dot-pattern { display: flex; gap: 4px; justify-content: center; margin-top: 32px; }
        .dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; opacity: 0.5; }
        
        /* --- Модальное окно --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content { background: var(--modal-bg); border-radius: 32px; padding: 32px; max-width: 500px; width: 90%; }
        .modal-content h3 { color: var(--text-primary); margin-bottom: 20px; }
        .star-rating { display: flex; gap: 8px; font-size: 40px; cursor: pointer; justify-content: center; margin-bottom: 20px; }
        .star { color: var(--text-secondary); transition: all 0.2s; cursor: pointer; }
        .star.active { color: #f59e0b; }
        .review-text { width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid var(--input-border); border-radius: 16px; font-family: inherit; color: var(--text-primary); resize: vertical; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn { padding: 10px 20px; border-radius: 60px; border: none; cursor: pointer; font-weight: 600; }
        .modal-btn.submit { background: var(--gradient-fire); color: #0D2744; }
        .modal-btn.cancel { background: var(--input-border); color: var(--text-secondary); }
        
        @media (max-width: 768px) {
            .bookings-card { padding: 30px 20px; }
            .booking-header { flex-direction: column; }
            .booking-actions { flex-wrap: wrap; }
            .action-btn { flex: 1; text-align: center; }
            .main-container { padding-top: 90px; padding-left: 16px; padding-right: 16px; }
            .header { top: 16px; width: calc(100% - 32px); padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>
    
    <div class="header">
        <a href="/" class="logo">✦ Arenda</a>
        <div class="right-section">
            <div class="nav" id="nav"></div>
            <div class="theme-switch">
                <button class="theme-btn light active" id="lightModeBtn">☼</button>
                <button class="theme-btn dark" id="darkModeBtn">☽</button>
            </div>
        </div>
    </div>
    
    <div class="main-container">
        <div class="bookings-card">
            <div class="bookings-header">
                <div class="bookings-title">
                    <h2>Мой профиль</h2>
                    <p>Управление бронированиями и отзывами</p>
                </div>
                <a href="/profile/" class="back-btn">← Назад</a>
            </div>
            
            <!-- Вкладки -->
            <div class="section-tabs">
                <button class="section-tab active" data-section="bookings">📋 Бронирования</button>
                <button class="section-tab" data-section="reviews">✍️ Мои отзывы</button>
            </div>
            
            <!-- Секция: Бронирования -->
            <div id="bookingsSection" class="section-content active">
                <div class="filters-section">
                    <div class="search-field">
                        <input type="text" placeholder="Поиск по адресу" id="searchInput">
                    </div>
                    <select class="filter-select" id="dateFilter">
                        <option value="all">Все даты</option>
                        <option value="month">Последний месяц</option>
                        <option value="3months">Последние 3 месяца</option>
                        <option value="year">Последний год</option>
                    </select>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalBookings">0</div>
                        <div class="stat-label">Всего бронирований</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeBookings">0</div>
                        <div class="stat-label">Активных</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalSpent">0 ₽</div>
                        <div class="stat-label">Потрачено</div>
                    </div>
                </div>
                
                <div class="status-tabs">
                    <button class="status-btn active" data-status="all">Все</button>
                    <button class="status-btn" data-status="active">Активные</button>
                    <button class="status-btn" data-status="waiting">Ожидают</button>
                    <button class="status-btn" data-status="completed">Завершённые</button>
                    <button class="status-btn" data-status="cancelled">Отменённые</button>
                </div>
                
                <div id="bookingsList" class="bookings-list">
                    <div class="loader">Загрузка...</div>
                </div>
            </div>
            
            <!-- Секция: Мои отзывы -->
            <div id="reviewsSection" class="section-content">
                <div id="reviewsList" class="reviews-list">
                    <div class="loader">Загрузка отзывов...</div>
                </div>
            </div>
            
            <div class="dot-pattern">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для отзыва -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3>⭐ Оставить отзыв</h3>
            <div class="star-rating">
                <span class="star" data-rating="1">☆</span>
                <span class="star" data-rating="2">☆</span>
                <span class="star" data-rating="3">☆</span>
                <span class="star" data-rating="4">☆</span>
                <span class="star" data-rating="5">☆</span>
            </div>
            <textarea id="reviewText" class="review-text" rows="4" placeholder="Поделитесь впечатлениями о квартире..."></textarea>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeReviewModal()">Отмена</button>
                <button class="modal-btn submit" onclick="submitReview()">Отправить</button>
            </div>
        </div>
    </div>
    
    <script>
        // --- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ---
        const lightModeBtn = document.getElementById('lightModeBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        
        function updateThemeButtons(theme) {
            if (theme === 'dark') {
                lightModeBtn.classList.remove('active');
                darkModeBtn.classList.add('active');
            } else {
                lightModeBtn.classList.add('active');
                darkModeBtn.classList.remove('active');
            }
        }
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateThemeButtons('dark');
            } else {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateThemeButtons('light');
            }
        }
        
        lightModeBtn.addEventListener('click', () => setTheme('light'));
        darkModeBtn.addEventListener('click', () => setTheme('dark'));
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            updateThemeButtons('dark');
        } else {
            updateThemeButtons('light');
        }
        
        // --- ШАПКА ---
        function renderNav() {
            const nav = document.getElementById('nav');
            const token = localStorage.getItem('token');
            const userName = localStorage.getItem('userName');
            
            if (token && userName) {
                nav.innerHTML = `
                    <a href="/">Поиск</a>
                    <a href="/profile/">👤 Профиль</a>
                    <button class="logout-btn" id="logoutBtnNav" style="background: none; border: 1px solid var(--header-border); padding: 8px 20px; border-radius: 40px; color: var(--header-text); cursor: pointer;">Выйти</button>
                `;
                document.getElementById('logoutBtnNav')?.addEventListener('click', () => {
                    localStorage.clear();
                    window.location.href = '/';
                });
            } else {
                nav.innerHTML = `<a href="/">Поиск</a><a href="/login/">Вход</a><a href="/register/" class="btn" style="padding: 8px 20px; background: var(--gradient-fire); border-radius: 60px; color: #0D2744; text-decoration: none;">Регистрация</a>`;
            }
        }
        renderNav();
        
        const API_URL = 'https://localhost:7151/api';
        const token = localStorage.getItem('token')?.trim();
        const userId = localStorage.getItem('userId');
        
        let allBookings = [];
        let myReviews = [];
        let currentBookingId = null;
        let selectedRating = 0;
        
        if (!token || !userId) {
            window.location.href = '/login/';
        }
        
        // --- Переключение вкладок ---
        document.querySelectorAll('.section-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const section = this.dataset.section;
                document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(`${section}Section`).classList.add('active');
                
                if (section === 'reviews') {
                    renderReviews();
                }
            });
        });
        
        // --- Звёздочки для модалки ---
        function initStarRating() {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    selectedRating = parseInt(this.dataset.rating);
                    stars.forEach(s => {
                        s.classList.remove('active');
                        s.textContent = '☆';
                    });
                    for (let i = 0; i < selectedRating; i++) {
                        stars[i].classList.add('active');
                        stars[i].textContent = '★';
                    }
                });
            });
        }
        
        function openReviewModal(bookingId) {
            currentBookingId = bookingId;
            selectedRating = 0;
            document.getElementById('reviewText').value = '';
            const stars = document.querySelectorAll('.star');
            stars.forEach(s => {
                s.classList.remove('active');
                s.textContent = '☆';
            });
            document.getElementById('reviewModal').style.display = 'flex';
        }
        
        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
            currentBookingId = null;
        }
        
        async function submitReview() {
            if (!currentBookingId) {
                alert('❌ Ошибка: ID бронирования не найден');
                return;
            }
            if (selectedRating === 0) {
                alert('❌ Пожалуйста, поставьте оценку');
                return;
            }
            const text = document.getElementById('reviewText').value.trim();
            if (!text) {
                alert('❌ Пожалуйста, напишите отзыв');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/Reviews`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        bronirovaniyeId: currentBookingId,
                        ratingId: selectedRating,
                        text: text
                    })
                });
                
                if (response.ok) {
                    alert('✅ Отзыв добавлен!');
                    closeReviewModal();
                    // Перезагружаем оба списка последовательно
                    await loadMyReviews();
                    await loadBookings();
                } else {
                    const errorText = await response.text();
                    alert('❌ Ошибка: ' + errorText);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка соединения с сервером');
            }
        }
        
        // --- Загрузка отзывов пользователя (возвращает Promise) ---
        async function loadMyReviews() {
            const container = document.getElementById('reviewsList');
            if (container) container.innerHTML = '<div class="loader">Загрузка отзывов...</div>';
            
            try {
                const response = await fetch(`${API_URL}/Reviews/user/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                myReviews = await response.json();
                renderReviews();
                return myReviews;
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                if (container) container.innerHTML = `<div class="empty-message">❌ Ошибка загрузки отзывов</div>`;
                return [];
            }
        }
        
        // --- Отображение отзывов ---
        function renderReviews() {
            const container = document.getElementById('reviewsList');
            if (!container) return;
            
            if (!myReviews || myReviews.length === 0) {
                container.innerHTML = '<div class="empty-message">✍️ У вас пока нет написанных отзывов</div>';
                return;
            }
            
            container.innerHTML = '';
            
            myReviews.forEach(review => {
                const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                const date = new Date(review.date).toLocaleDateString('ru-RU');
                const statusHtml = review.odobreno 
                    ? '<span class="review-status approved">✓ Одобрен</span>' 
                    : '<span class="review-status">⏳ На модерации</span>';
                
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                    <div class="review-header">
                        <div class="review-apartment">🏠 ${escapeHtml(review.apartmentAddress)}</div>
                        <div class="review-stars">${stars}</div>
                    </div>
                    <div class="review-text">${escapeHtml(review.text)}</div>
                    <div class="review-date">📅 ${date}</div>
                    <div style="margin-top: 12px;">${statusHtml}</div>
                `;
                container.appendChild(card);
            });
        }
        
        // --- Проверка, есть ли отзыв на бронирование ---
        function hasReviewForBooking(bookingId) {
            return myReviews.some(review => review.bronirovaniyeId === bookingId);
        }
        
        // --- Загрузка бронирований (сначала ждём отзывы) ---
        async function loadBookings() {
            const container = document.getElementById('bookingsList');
            container.innerHTML = '<div class="loader">Загрузка...</div>';
            
            try {
                // Сначала загружаем отзывы, чтобы myReviews был заполнен
                await loadMyReviews();
                
                const response = await fetch(`${API_URL}/Bookings/user/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                
                allBookings = await response.json();
                updateStats();
                renderBookings('all');
            } catch (error) {
                console.error('Ошибка:', error);
                container.innerHTML = `<div class="empty-message">❌ Ошибка загрузки: ${error.message}</div>`;
            }
        }
        
        // --- Статистика ---
        function updateStats() {
            const total = allBookings.length;
            const active = allBookings.filter(b => b.status === 'Новая' || b.status === 'Подтверждена').length;
            const totalSpent = allBookings.reduce((sum, b) => sum + (b.totalPrice || 0), 0);
            
            document.getElementById('totalBookings').textContent = total;
            document.getElementById('activeBookings').textContent = active;
            document.getElementById('totalSpent').textContent = totalSpent.toLocaleString() + ' ₽';
        }
        
        // --- Отображение бронирований ---
        function renderBookings(statusFilter) {
            const container = document.getElementById('bookingsList');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allBookings];
            
            if (statusFilter !== 'all') {
                if (statusFilter === 'active') {
                    filtered = filtered.filter(b => b.status === 'Новая' || b.status === 'Подтверждена');
                } else if (statusFilter === 'waiting') {
                    filtered = filtered.filter(b => b.status === 'Новая');
                } else if (statusFilter === 'completed') {
                    filtered = filtered.filter(b => b.status === 'Завершена');
                } else if (statusFilter === 'cancelled') {
                    filtered = filtered.filter(b => b.status === 'Отменена');
                }
            }
            
            if (searchText) {
                filtered = filtered.filter(b => b.apartmentAddress.toLowerCase().includes(searchText));
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-message">📭 У вас пока нет бронирований</div>';
                return;
            }
            
            container.innerHTML = '';
            
            filtered.forEach(booking => {
                let statusClass = '', statusText = '';
                switch (booking.status) {
                    case 'Новая': statusClass = 'status-waiting'; statusText = '⏳ Ожидает подтверждения'; break;
                    case 'Подтверждена': statusClass = 'status-active'; statusText = '✅ Подтверждена'; break;
                    case 'Отменена': statusClass = 'status-cancelled'; statusText = '❌ Отменена'; break;
                    case 'Завершена': statusClass = 'status-completed'; statusText = '✓ Завершена'; break;
                    default: statusClass = 'status-completed'; statusText = booking.status;
                }
                
                const checkIn = new Date(booking.checkIn).toLocaleDateString('ru-RU');
                const checkOut = new Date(booking.checkOut).toLocaleDateString('ru-RU');
                
                // Проверяем, есть ли уже отзыв на это бронирование (myReviews уже загружен)
                const reviewExists = hasReviewForBooking(booking.id);
                
                // Кнопка отзыва: показываем только для завершённых, но если отзыв есть — блокируем
                let reviewButtonHtml = '';
                if (booking.status === 'Завершена') {
                    if (reviewExists) {
                        reviewButtonHtml = `<button class="action-btn disabled" disabled>⭐ Отзыв уже оставлен</button>`;
                    } else {
                        reviewButtonHtml = `<button class="action-btn" onclick="openReviewModal(${booking.id})">⭐ Оставить отзыв</button>`;
                    }
                }
                
                const item = document.createElement('div');
                item.className = 'booking-item';
                item.innerHTML = `
                    <div class="booking-header">
                        <div class="booking-title">
                            <h3>🏠 ${escapeHtml(booking.apartmentAddress)}</h3>
                            <div class="booking-address">📍 ${escapeHtml(booking.apartmentAddress)}</div>
                        </div>
                        <span class="booking-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="booking-details">
                        <div class="detail-item">
                            <span class="detail-label">Даты проживания</span>
                            <span class="detail-value">${checkIn} — ${checkOut}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Стоимость</span>
                            <span class="detail-value price">${(booking.totalPrice || 0).toLocaleString()} ₽</span>
                        </div>
                    </div>
                    <div class="booking-actions">
                        ${booking.status !== 'Отменена' && booking.status !== 'Завершена' ? 
                            `<button class="action-btn cancel" onclick="cancelBooking(${booking.id})">❌ Отменить бронирование</button>` : ''}
                        ${reviewButtonHtml}
                    </div>
                `;
                container.appendChild(item);
            });
        }
        
        // --- Отмена бронирования ---
        async function cancelBooking(bookingId) {
            if (!confirm('Отменить бронирование? Это действие нельзя отменить.')) return;
            try {
                const response = await fetch(`${API_URL}/Bookings/${bookingId}/cancel-by-tenant`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    alert('❌ Бронирование отменено');
                    await loadBookings();
                } else {
                    const data = await response.json();
                    alert('❌ Ошибка: ' + (data.message || 'Не удалось отменить'));
                }
            } catch (error) {
                alert('❌ Ошибка соединения с сервером');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        // --- Фильтры ---
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderBookings(this.getAttribute('data-status'));
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', () => {
            const activeBtn = document.querySelector('.status-btn.active');
            renderBookings(activeBtn.getAttribute('data-status'));
        });
        
        // --- Инициализация ---
        initStarRating();
        
        // Запускаем загрузку (отзывы загрузятся внутри loadBookings)
        loadBookings();
        
        // Экспорт глобальных функций
        window.openReviewModal = openReviewModal;
        window.closeReviewModal = closeReviewModal;
        window.submitReview = submitReview;
        window.cancelBooking = cancelBooking;
    </script>
</body>
</html>
