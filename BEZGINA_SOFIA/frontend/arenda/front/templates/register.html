<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arenda | Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* --- ПАЛИТРА (Tangaroa + Firebrick) --- */
        :root {
            --tangaroa: #0D2744;
            --wedgewood: #53728A;
            --shipcove: #7691AD;
            --spindle: #B9CFDD;
            --firebrick: #FF929A;
            --firebrick-hover: #e07a83;
            --white: #FFFFFF;
            --text-dark: #1a2a3a;
            --text-light: #6a7f8f;
            --shadow-sm: 0 8px 20px rgba(13, 39, 68, 0.06);
            --shadow-md: 0 12px 28px rgba(13, 39, 68, 0.1);
            --shadow-lg: 0 20px 35px -10px rgba(13, 39, 68, 0.15);
            --gradient-fire: linear-gradient(135deg, #FF929A 0%, #f07a83 100%);
            
            /* Светлая тема */
            --bg-body: #B9CFDD;
            --bg-gradient-start: #d4e5f0;
            --bg-gradient-mid: #B9CFDD;
            --bg-gradient-end: #a8c0ce;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(255, 146, 154, 0.25);
            --text-primary: #1a2a3a;
            --text-secondary: #6a7f8f;
            --input-bg: #f9fafb;
            --input-border: #e5e7eb;
            --input-focus: #FF929A;
            --role-bg: #f3f4f6;
            --role-active-bg: #FFFFFF;
            --role-active-text: #0D2744;
            --role-inactive-text: #6a7f8f;
            --sun-icon-color: #B9CFDD;
            --moon-icon-color: #B9CFDD;
            --header-bg: rgba(13, 39, 68, 0.85);
            --header-text: rgba(185, 207, 221, 0.9);
            --header-border: rgba(255, 255, 255, 0.1);
        }
        
        /* Тёмная тема */
        body.dark {
            --bg-body: #0D2744;
            --bg-gradient-start: #1a3a5a;
            --bg-gradient-mid: #0D2744;
            --bg-gradient-end: #06152a;
            --card-bg: rgba(58, 90, 122, 0.95);
            --card-border: rgba(255, 146, 154, 0.35);
            --text-primary: #FFFFFF;
            --text-secondary: #c0d0e0;
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-focus: #FF929A;
            --role-bg: rgba(255, 255, 255, 0.1);
            --role-active-bg: #FF929A;
            --role-active-text: #0D2744;
            --role-inactive-text: #c0d0e0;
            --sun-icon-color: #0D2744;
            --moon-icon-color: #0D2744;
            --header-bg: rgba(185, 207, 221, 0.95);
            --header-text: #0D2744;
            --header-border: rgba(13, 39, 68, 0.15);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: var(--bg-body);
            transition: all 0.3s ease;
        }
        
        /* Контейнер для карточки с отступом от шапки */
        .page-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 90px;
            padding-bottom: 40px;
        }
        
        /* --- ЖИВОЙ ФОН --- */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            z-index: 0;
            transition: background 0.3s ease;
        }
        
        .bg-circle-1 {
            position: fixed;
            top: -150px;
            right: -100px;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(255, 146, 154, 0.25) 0%, rgba(255, 146, 154, 0.05) 60%, rgba(255, 146, 154, 0) 80%);
            border-radius: 50%;
            z-index: 0;
            animation: float1 18s ease-in-out infinite;
            transition: background 0.3s ease;
        }
        
        .bg-circle-2 {
            position: fixed;
            bottom: -120px;
            left: -80px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(13, 39, 68, 0.15) 0%, rgba(13, 39, 68, 0.05) 60%, rgba(13, 39, 68, 0) 80%);
            border-radius: 50%;
            z-index: 0;
            animation: float2 22s ease-in-out infinite;
            transition: background 0.3s ease;
        }
        
        .bg-circle-3 {
            position: fixed;
            top: 40%;
            left: -50px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(83, 114, 138, 0.2) 0%, rgba(83, 114, 138, 0.05) 60%, rgba(83, 114, 138, 0) 80%);
            border-radius: 50%;
            z-index: 0;
            animation: float3 15s ease-in-out infinite;
            transition: background 0.3s ease;
        }
        
        .bg-circle-4 {
            position: fixed;
            bottom: 20%;
            right: 15%;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(255, 146, 154, 0.2) 0%, rgba(255, 146, 154, 0.02) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float1 25s ease-in-out infinite reverse;
            transition: background 0.3s ease;
        }
        
        .bg-blob {
            position: fixed;
            bottom: 5%;
            right: 5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 146, 154, 0.15) 0%, rgba(255, 146, 154, 0) 70%);
            border-radius: 60% 40% 50% 50% / 40% 50% 50% 60%;
            z-index: 0;
            animation: morph 15s ease-in-out infinite;
            transition: background 0.3s ease;
        }
        
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(13, 39, 68, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(13, 39, 68, 0.08) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            z-index: 0;
            transition: background 0.3s ease;
        }
        
        .bg-grid-diagonal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(13, 39, 68, 0.05) 0px, rgba(13, 39, 68, 0.05) 1px, transparent 1px, transparent 30px);
            z-index: 0;
            transition: background 0.3s ease;
        }
        
        body.dark .bg-grid {
            background-image: 
                linear-gradient(rgba(185, 207, 221, 0.1) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(185, 207, 221, 0.1) 1.5px, transparent 1.5px);
        }
        
        body.dark .bg-grid-diagonal {
            background-image: repeating-linear-gradient(45deg, rgba(185, 207, 221, 0.08) 0px, rgba(185, 207, 221, 0.08) 1px, transparent 1px, transparent 30px);
        }
        
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -20px) scale(1.05); }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 30px) scale(1.08); }
        }
        
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 40px); }
        }
        
        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 50% 50% / 40% 50% 50% 60%; }
            50% { border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%; }
        }
        
        /* --- ШАПКА (фиксированная) --- */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1200px;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--header-border);
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #FF929A 0%, #B9CFDD 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        
        body.dark .logo {
            background: linear-gradient(135deg, #FF929A 0%, #0D2744 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }
        
        .right-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .nav a { 
            color: var(--header-text); 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.2s;
            margin-right: 20px;
        }
        
        .nav a:hover { color: var(--firebrick); }
        
        /* --- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ --- */
        .theme-switch {
            display: flex;
            gap: 4px;
            background: rgba(13, 39, 68, 0.15);
            border-radius: 60px;
            padding: 4px;
        }
        
        body.dark .theme-switch {
            background: rgba(185, 207, 221, 0.2);
        }
        
        .theme-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 60px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .theme-btn.light {
            color: var(--sun-icon-color);
            background: transparent;
        }
        
        .theme-btn.dark {
            color: var(--moon-icon-color);
            background: transparent;
        }
        
        .theme-btn.light.active {
            background: var(--gradient-fire);
            color: #0D2744;
        }
        
        .theme-btn.dark.active {
            background: var(--gradient-fire);
            color: #0D2744;
        }
        
        /* --- КАРТОЧКА РЕГИСТРАЦИИ --- */
        .register-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 520px;
            padding: 40px;
            position: relative;
            z-index: 10;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .register-header h2 {
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        
        .register-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        
        /* --- РОЛИ --- */
        .role-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: var(--role-bg);
            padding: 6px;
            border-radius: 60px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .role-btn.tenant {
            color: var(--role-inactive-text);
        }
        
        .role-btn.tenant.active {
            background: var(--role-active-bg);
            color: var(--role-active-text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .role-btn.landlord {
            color: var(--role-inactive-text);
        }
        
        .role-btn.landlord.active {
            background: var(--role-active-bg);
            color: var(--role-active-text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        /* --- ФОРМА --- */
        .input-field {
            margin-bottom: 20px;
        }
        
        .input-field label {
            display: block;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .input-field label span {
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .input-field input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 16px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .input-field input:focus {
            outline: none;
            border-color: var(--input-focus);
            background: var(--card-bg);
        }
        
        .input-field input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
            font-size: 14px;
        }
        
        .name-row {
            display: flex;
            gap: 12px;
            margin-bottom: 0;
        }
        
        .name-field {
            flex: 1;
        }
        
        /* --- КНОПКА РЕГИСТРАЦИИ --- */
        .register-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            color: #0D2744;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 16px 0 24px;
            background: var(--gradient-fire);
            box-shadow: 0 6px 20px rgba(255, 146, 154, 0.4);
        }
        
        .register-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(255, 146, 154, 0.5);
        }
        
        .register-button:active {
            transform: translateY(0);
        }
        
        .login-link {
            text-align: center;
        }
        
        .login-link p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        
        .login-link a {
            color: var(--firebrick);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .dot-pattern {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 24px;
        }
        
        .dot {
            width: 4px;
            height: 4px;
            background: var(--text-secondary);
            border-radius: 50%;
            opacity: 0.5;
        }
        
        @media (max-width: 600px) {
            body { padding: 0; }
            .page-container {
                padding-top: 100px;
                padding-bottom: 40px;
                padding-left: 16px;
                padding-right: 16px;
            }
            .header { 
                top: 16px; 
                width: calc(100% - 32px); 
                padding: 8px 20px;
            }
            .right-section { gap: 10px; }
            .nav a { margin-right: 12px; font-size: 14px; }
            .register-card { padding: 32px 24px; }
            .register-header h2 { font-size: 28px; }
            .name-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>
    <div class="bg-circle-3"></div>
    <div class="bg-circle-4"></div>
    <div class="bg-blob"></div>
    <div class="bg-grid"></div>
    <div class="bg-grid-diagonal"></div>
    
    <div class="header">
        <a href="/" class="logo">✦ Arenda</a>
        <div class="right-section">
            <div class="nav">
                <a href="/">Поиск</a>
                <a href="/login/">Вход</a>
            </div>
            <div class="theme-switch">
                <button class="theme-btn light active" id="lightModeBtn">☼</button>
                <button class="theme-btn dark" id="darkModeBtn">☽</button>
            </div>
        </div>
    </div>
    
    <div class="page-container">
        <div class="register-card">
            <div class="register-header">
                <h2>Создать аккаунт</h2>
                <p>Заполните форму для регистрации</p>
            </div>
            
            <div class="role-selector">
                <button class="role-btn tenant active" id="tenantBtn">Арендатор</button>
                <button class="role-btn landlord" id="landlordBtn">Арендодатель</button>
            </div>
            
            <form id="registerForm">
                <div class="input-field">
                    <label for="login">Логин</label>
                    <input type="text" id="login" name="login" required placeholder="Придумайте логин">
                </div>
                
                <div class="name-row">
                    <div class="input-field name-field">
                        <label for="first_name">Имя</label>
                        <input type="text" id="first_name" name="first_name" required placeholder="Имя">
                    </div>
                    <div class="input-field name-field">
                        <label for="last_name">Фамилия</label>
                        <input type="text" id="last_name" name="last_name" required placeholder="Фамилия">
                    </div>
                </div>
                
                <div class="input-field">
                    <label for="patronymic">Отчество <span>(необязательно)</span></label>
                    <input type="text" id="patronymic" name="patronymic" placeholder="Отчество">
                </div>
                
                <div class="input-field">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 999-99-99">
                </div>
                
                <div class="input-field">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.com">
                </div>
                
                <div class="input-field">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="Придумайте надежный пароль">
                </div>
                
                <button type="submit" class="register-button" id="registerBtn">Зарегистрироваться</button>
            </form>
            
            <div class="login-link">
                <p>Уже есть аккаунт? <a href="/login/" id="loginLink">Войти</a></p>
            </div>
            
            <div class="dot-pattern">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    
    <script>
        // --- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ---
        const lightModeBtn = document.getElementById('lightModeBtn');
        const darkModeBtn = document.getElementById('darkModeBtn');
        
        function updateThemeButtons(theme) {
            if (theme === 'dark') {
                lightModeBtn.classList.remove('active');
                darkModeBtn.classList.add('active');
            } else {
                lightModeBtn.classList.add('active');
                darkModeBtn.classList.remove('active');
            }
        }
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateThemeButtons('dark');
            } else {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateThemeButtons('light');
            }
        }
        
        lightModeBtn.addEventListener('click', () => setTheme('light'));
        darkModeBtn.addEventListener('click', () => setTheme('dark'));
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            updateThemeButtons('dark');
        } else {
            updateThemeButtons('light');
        }
        
        const API_URL = 'https://localhost:7151/api';
        
        const tenantBtn = document.getElementById('tenantBtn');
        const landlordBtn = document.getElementById('landlordBtn');
        const loginLink = document.getElementById('loginLink');
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('registerBtn');
        
        let currentRole = 'tenant';
        
        // Функция обновления интерфейса в зависимости от роли
        function updateRoleUI(role) {
            if (role === 'tenant') {
                tenantBtn.classList.add('active');
                landlordBtn.classList.remove('active');
            } else {
                landlordBtn.classList.add('active');
                tenantBtn.classList.remove('active');
            }
        }
        
        tenantBtn.addEventListener('click', () => {
            currentRole = 'tenant';
            updateRoleUI(currentRole);
        });
        
        landlordBtn.addEventListener('click', () => {
            currentRole = 'landlord';
            updateRoleUI(currentRole);
        });
        
        // Маска для телефона
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                if (value.length <= 1) {
                    value = `+7 (${value}`;
                } else if (value.length <= 4) {
                    value = `+7 (${value.slice(1, 4)}`;
                } else if (value.length <= 7) {
                    value = `+7 (${value.slice(1, 4)}) ${value.slice(4, 7)}`;
                } else {
                    value = `+7 (${value.slice(1, 4)}) ${value.slice(4, 7)}-${value.slice(7, 9)}-${value.slice(9, 11)}`;
                }
                e.target.value = value;
            }
        });
        
        // Обработка отправки формы
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Валидация
            let isValid = true;
            const required = ['login', 'first_name', 'last_name', 'phone', 'email', 'password'];
            
            required.forEach(field => {
                const input = document.getElementById(field);
                if (!input.value.trim()) {
                    input.style.borderColor = '#FF929A';
                    isValid = false;
                    setTimeout(() => {
                        input.style.borderColor = 'var(--input-border)';
                    }, 2000);
                }
            });
            
            if (!isValid) {
                alert('Пожалуйста, заполните все обязательные поля');
                return;
            }
            
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Регистрация...';
            
            try {
                let phoneRaw = document.getElementById('phone').value.replace(/\D/g, '');
                if (phoneRaw.startsWith('7') && phoneRaw.length === 11) {
                    phoneRaw = '+' + phoneRaw;
                }
                
                const userData = {
                    login: document.getElementById('login').value.trim(),
                    password: document.getElementById('password').value,
                    email: document.getElementById('email').value.trim(),
                    phone: phoneRaw,
                    firstName: document.getElementById('first_name').value.trim(),
                    lastName: document.getElementById('last_name').value.trim(),
                    patronymic: document.getElementById('patronymic').value.trim() || null,
                    isLandlord: currentRole === 'landlord'
                };
                
                const response = await fetch(`${API_URL}/Auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.userId) {
                    alert('✅ Регистрация успешна! Теперь вы можете войти.');
                    window.location.href = '/login/';
                } else {
                    alert('❌ Ошибка: ' + (result.message || 'Неизвестная ошибка'));
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка соединения с сервером. Проверьте, запущен ли бэкенд на порту 7151');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
        
        loginLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/login/';
        });
    </script>
</body>
</html>
